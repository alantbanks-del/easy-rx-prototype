<!-- ============================================================
     AI RX  —  drop-in module for rx.html
     Paste this block where the launcher's "AI Rx" option mounts.
     It calls the Netlify claude.js function, converts free text /
     voice into the exact caseObj that window.roeApplyCase() already
     expects, applies it to the REAL engine, then reports back using
     the engine's own {applied, skipped} so the engine's own dynamic
     questions handle whatever's missing. No parallel form.
     ============================================================ -->

<style>
  #airx-wrap{max-width:640px;margin:0 auto;}
  #airx-search{display:flex;align-items:flex-end;gap:8px;background:#fff;border:1px solid #E4E0D8;border-radius:26px;padding:8px 8px 8px 20px;box-shadow:0 8px 28px -16px rgba(20,58,64,.35);transition:border-color .2s,box-shadow .2s;}
  #airx-search:focus-within{border-color:#143A40;box-shadow:0 10px 34px -14px rgba(20,58,64,.5);}
  #airx-q{flex:1;border:0;outline:0;resize:none;background:transparent;font:inherit;font-size:17px;line-height:1.5;color:#16201F;padding:9px 0;max-height:160px;min-height:24px;}
  #airx-q::placeholder{color:#9AA6A4;}
  .airx-icon{flex:none;width:46px;height:46px;border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#EAF1F0;color:#143A40;transition:transform .12s,background .2s,color .2s;}
  .airx-icon:active{transform:scale(.92);}
  .airx-icon.go{background:#143A40;color:#fff;}
  .airx-icon.go:disabled{opacity:.4;cursor:default;}
  .airx-icon.mic.live{background:#C0392B;color:#fff;animation:airxpulse 1.2s infinite;}
  @keyframes airxpulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5);}70%{box-shadow:0 0 0 12px rgba(192,57,43,0);}100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}}
  .airx-icon svg{width:22px;height:22px;}
  #airx-hints{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:center;}
  .airx-chip{font-size:13px;color:#143A40;background:#fff;border:1px solid #E4E0D8;border-radius:20px;padding:7px 13px;cursor:pointer;}
  .airx-chip:active{background:#EAF1F0;}
  #airx-mstate{text-align:center;color:#9A6A12;font-size:13.5px;margin-top:12px;min-height:18px;font-weight:600;}
  #airx-report{margin-top:18px;}
  .airx-think{display:flex;align-items:center;gap:11px;color:#5E6B69;font-size:15px;padding:16px 4px;}
  .airx-spin{width:18px;height:18px;border:2.5px solid #E4E0D8;border-top-color:#143A40;border-radius:50%;animation:airxspin .7s linear infinite;}
  @keyframes airxspin{to{transform:rotate(360deg);}}
  .airx-banner{display:flex;gap:11px;padding:13px 15px;border-radius:12px;font-size:14.5px;line-height:1.5;}
  .airx-banner.ok{background:#E7F2EE;color:#1E6E5C;}
  .airx-banner.need{background:#FBF1DC;color:#9A6A12;}
  .airx-banner b{font-weight:700;}
  .airx-list{margin:10px 0 0;padding-left:18px;font-size:14px;color:#5E6B69;line-height:1.6;}
  .airx-list li.skip{color:#9A6A12;}
  .airx-err{background:#FBE9E7;color:#B0341F;padding:13px 15px;border-radius:12px;font-size:14px;line-height:1.5;}
</style>

<div id="airx-wrap">
  <div id="airx-search">
    <textarea id="airx-q" rows="1" placeholder="e.g. Zirconia crown #8, shade A2…" autocomplete="off"></textarea>
    <button class="airx-icon mic" id="airx-mic" title="Hold to talk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
    <button class="airx-icon go" id="airx-go" title="Write up Rx" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
  </div>
  <div id="airx-mstate"></div>
  <div id="airx-hints">
    <span class="airx-chip">Zirconia crown #8, A2</span>
    <span class="airx-chip">3-unit bridge 4-6, B1</span>
    <span class="airx-chip">e.max crown #9, BL2</span>
    <span class="airx-chip">PFZ crowns 13 and 14, A3.5</span>
  </div>
  <div id="airx-report"></div>
</div>

<script>
(function(){
  var PARSE_ENDPOINT = "/.netlify/functions/claude";
  var MODEL = "claude-sonnet-4-6";

  var q=document.getElementById('airx-q'),
      go=document.getElementById('airx-go'),
      mic=document.getElementById('airx-mic'),
      mstate=document.getElementById('airx-mstate'),
      hints=document.getElementById('airx-hints'),
      report=document.getElementById('airx-report');

  function sync(){ q.style.height='auto'; q.style.height=Math.min(q.scrollHeight,160)+'px'; go.disabled=!q.value.trim(); }
  q.addEventListener('input',sync);
  q.addEventListener('keydown',function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submit(); } });
  hints.addEventListener('click',function(e){ var c=e.target.closest('.airx-chip'); if(!c)return; q.value=c.textContent; sync(); q.focus(); });
  go.addEventListener('click',submit);

  /* voice */
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition, rec=null, listening=false;
  if(SR){
    rec=new SR(); rec.continuous=true; rec.interimResults=true; rec.lang='en-US';
    var base='';
    rec.onstart=function(){ listening=true; mic.classList.add('live'); mstate.textContent='Listening… release to stop'; base=q.value?q.value+' ':''; };
    rec.onresult=function(e){ var t=''; for(var i=0;i<e.results.length;i++) t+=e.results[i][0].transcript; q.value=base+t; sync(); };
    rec.onerror=function(e){ mstate.textContent=e.error==='not-allowed'?'Microphone blocked — allow access in browser settings.':'Mic error: '+e.error; };
    rec.onend=function(){ listening=false; mic.classList.remove('live'); mstate.textContent=''; };
    var start=function(){ if(!listening){ try{rec.start();}catch(_){} } }, stop=function(){ if(listening)rec.stop(); };
    mic.addEventListener('mousedown',start);
    mic.addEventListener('touchstart',function(e){e.preventDefault();start();},{passive:false});
    mic.addEventListener('mouseup',stop); mic.addEventListener('mouseleave',stop);
    mic.addEventListener('touchend',function(e){e.preventDefault();stop();},{passive:false});
  }else{
    mic.addEventListener('click',function(){ mstate.textContent='Voice input needs Chrome or Safari.'; setTimeout(function(){mstate.textContent='';},2500); });
  }

  /* prompt — produces the EXACT caseObj shape roeApplyCase/setFromCase expects.
     Valid material keys: TLZ, zRc, emaxMono, emaxLay, PFZ, PFM, FullCast, Bespoke.
     Valid roles: crown, bridge, veneer, pontic.
     Shade systems are the FXSHADE_TRAD .sys strings. caseSpec keys/opts are the CASE_SPEC grid. */
  function prompt(text){
    return [
"You are the ROE Dental Laboratory AI Rx intake engine. Convert a clinician's free-text or spoken case into a JSON case object for the Fixed & Implants engine.",
"",
"CLINICIAN INPUT:",
'"""'+text+'"""',
"",
"OUTPUT — return ONLY this JSON (no markdown, no prose):",
"{",
'  "engine":"fixed",',
'  "arch":"upper|lower",',
'  "caseLabel":"short human label, e.g. Single Crown #8",',
'  "units":[{"tooth":8,"role":"crown","material":"TLZ"}],',
'  "shadeSystem":"VITA Classical A1-D4",',
'  "shade":"A2",',
'  "caseSpec":{},',
'  "interpretation":"one short note on anything assumed"',
"}",
"",
"RULES:",
"- arch: teeth 1-16 = upper, 17-32 = lower. If a tooth number is given, derive arch from it.",
"- role: one of crown | bridge | veneer | pontic. A plain 'crown' is crown. Bridge abutments are 'bridge', the missing-tooth unit between them is 'pontic'.",
'- material KEY must be exactly one of: "TLZ" (default zirconia — translucent monolithic), "zRc" (economy zirconia), "emaxMono" (e.max monolithic), "emaxLay" (e.max layered), "PFZ" (porcelain-fused-zirconia), "PFM", "FullCast", "Bespoke". If clinician says zirconia / monolithic / unspecified crown -> "TLZ". If they say e.max or lithium disilicate -> "emaxMono". Only use what is implied; never invent.',
"- shade: if a shade like A2/B1/BL2 is given, set shade to it and pick the matching shadeSystem. Default shadeSystem is \"VITA Classical A1-D4\". BL shades use \"IPS e.max / Ivoclar Bleach BL\". If no shade is stated, OMIT both shade and shadeSystem (the engine will ask).",
"- caseSpec: only include keys the clinician explicitly states. Valid keys/values: occAnatomy[Match Adjacent/Partner|Ideal], occContact[Light|Full|Very light|Out of occlusion], occStain[Light|Medium|Dark|None], translucency[Standard|Increased|Minimal|As Drawn], contactShape[Standard|Broad|Extra Broad], contour[Match Adj./Partner|Match Study Model|Ideal], closeBite[Call|Trim/Mark Opp.|Trim w/Coping]. Leave caseSpec empty {} if nothing is stated — the engine applies ROE standards itself; do not echo defaults here.",
"- Do NOT include fields you cannot determine. The engine surfaces its own questions for anything missing.",
"- units is REQUIRED — at least one tooth with a role. If no tooth number is determinable, return units:[] and explain in interpretation."
    ].join("\n");
  }

  function submit(){
    var text=q.value.trim(); if(!text) return;
    go.disabled=true;
    report.innerHTML='<div class="airx-think"><div class="airx-spin"></div>Reading the case and writing up the Rx…</div>';
    fetch(PARSE_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,max_tokens:1200,messages:[{role:'user',content:prompt(text)}]})})
    .then(function(r){ if(!r.ok) throw new Error('Backend '+r.status); return r.json(); })
    .then(function(data){
      var raw=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n');
      raw=raw.replace(/```json|```/g,'').trim();
      var c=JSON.parse(raw);
      apply(c);
    })
    .catch(function(err){
      report.innerHTML='<div class="airx-err"><b>Couldn\'t reach the parser.</b><br>'+err.message+'</div>';
      go.disabled=false;
    });
  }

  /* Hand the parsed case to the REAL engine and report using ITS feedback. */
  function apply(c){
    if(!c.units || !c.units.length){
      report.innerHTML='<div class="airx-banner need"><div>I couldn\'t tell which tooth this is for. Add a tooth number (e.g. "#8") and try again.<br><small>'+(c.interpretation||'')+'</small></div></div>';
      go.disabled=false; return;
    }
    if(typeof window.roeApplyCase!=='function'){
      report.innerHTML='<div class="airx-err">roeApplyCase() not found — this module must run inside rx.html.</div>';
      go.disabled=false; return;
    }
    // Drive the real engine. It mounts Fixed on the arch, pre-fills, and renders ITS own UI (with its own dynamic questions for anything unfilled).
    var res=window.roeApplyCase(c);
    go.disabled=false;
    if(!res || !res.ok){
      report.innerHTML='<div class="airx-err">Engine couldn\'t apply the case'+(res&&res.error?': '+res.error:'')+'.</div>';
      return;
    }
    var rep=res.report||{applied:[],skipped:[]};
    var applied=rep.applied||[], skipped=rep.skipped||[];

    // What still needs attention = the engine's required fields the parser couldn't set.
    // shade is the common one; surface it plainly and let the engine's own shade UI handle it.
    var needShade = !c.shade;
    var open = [];
    if(needShade) open.push('Shade — pick it on the chart');
    skipped.forEach(function(s){ open.push(s); });

    var html='';
    if(open.length===0){
      html+='<div class="airx-banner ok"><div><b>All set.</b> '+esc(c.caseLabel||'Case')+' is written up and ready — scroll up to review and send.</div></div>';
    }else{
      var n=open.length;
      html+='<div class="airx-banner need"><div><b>'+esc(c.caseLabel||'Case')+'</b> is mostly done. Just '+n+' more '+(n===1?'thing':'things')+' — finish '+(n===1?'it':'them')+' on the engine above:</div></div>';
      html+='<ul class="airx-list">'+open.map(function(o){return '<li>'+esc(o)+'</li>';}).join('')+'</ul>';
    }
    if(applied.length){
      html+='<ul class="airx-list">'+applied.map(function(a){return '<li>✓ '+esc(a)+'</li>';}).join('')+'</ul>';
    }
    if(c.interpretation){ html+='<div class="airx-list" style="list-style:none;padding-left:0;font-style:italic;margin-top:10px;">'+esc(c.interpretation)+'</div>'; }
    report.innerHTML=html;
  }

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]);});}
  sync();
})();
</script>
